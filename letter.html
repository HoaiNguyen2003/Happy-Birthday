<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Bất Ngờ Đặc Biệt Dành Cho Cậu ✨</title>
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8e1f4, #e0c3f7, #d6ffff);
            background-size: 400% 400%;
            animation: gradientBackground 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 3s forwards 0.5s;
        }

        /* Header Styles */
        header {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }

        h1 {
            font-size: 2rem;
            color: #6a4c93;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Letter Section */
        .letter-container {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(106, 76, 147, 0.3);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        .letter-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(255, 215, 232, 0.7);
            pointer-events: none;
            z-index: 1;
        }

        .letter {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            position: relative;
            z-index: 2;
            min-height: 200px;
        }

        .video-container {
            display: none;
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            margin-bottom: 40px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(106, 76, 147, 0.3), 0 0 30px rgba(255, 215, 232, 0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Surprise Button */
        .surprise-button-container {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .surprise-button {
            background: linear-gradient(45deg, #00d2ff, #66FFFF, #0072ff, #00d2ff);
            background-size: 300% 300%;
            animation: gradientButton 5s ease infinite;
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            padding: 10px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .surprise-button::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 55px;
            background: linear-gradient(45deg, #00d2ff, #66FFFF, #0072ff, #75c6ff);
            background-size: 300% 300%;
            animation: gradientButton 5s ease infinite;
            z-index: -1;
            opacity: 0.6;
            filter: blur(8px);
        }

        .surprise-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.7);
        }

        .surprise-button:active {
            transform: translateY(1px);
        }

        /* Surprise Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 600px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            transform: scale(0.8);
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 215, 232, 0.8);
            text-align: center;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-body {
            margin-bottom: 30px;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: #6a4c93;
            background: none;
            border: none;
            cursor: pointer;
        }

        /* Playlist Styling */
        .playlist {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(240, 240, 255, 0.7);
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .playlist-item:hover {
            background: rgba(225, 225, 255, 0.9);
            transform: translateX(5px);
        }

        .playlist-item.playing {
            background: rgba(0, 210, 255, 0.15) !important;
            border-left: 4px solid #00d2ff;
        }

        .playlist-item img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        .playlist-item-info {
            flex-grow: 1;
            text-align: left;
        }

        .playlist-item-title {
            font-weight: bold;
            color: #6a4c93;
        }

        .playlist-item-artist {
            font-size: 0.9rem;
            color: #888;
        }

        .playlist-item-play {
            background: none;
            border: none;
            color: #6a4c93;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Back Button */
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #0072ff;
            color: #0072ff;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #0072ff;
            color: white;
        }

        /* Floating Elements */
        .floating-element {
            position: absolute;
            pointer-events: none;
            opacity: 0.7;
            z-index: 1;
            animation-name: float;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }



        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gradientBackground {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes gradientButton {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* Cursor Effect */
        .cursor-effect {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 182, 193, 0.7);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
            opacity: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                margin-bottom: 10px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .container {
                padding: 12px;
            }

            .letter-container {
                padding: 18px 15px;
                margin-bottom: 25px;
            }

            .letter {
                font-size: 1rem;
            }

            .surprise-button {
                font-size: 1rem;
                padding: 8px 24px;
            }

            .floating-element {
                max-width: 40px;
                max-height: 40px;
            }
        }

        /* Mini Player Styling */
        .mini-player {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(106, 76, 147, 0.12);
            border: 2px solid #feecea;
            display: none;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .mini-player.active {
            display: flex;
        }

        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-title-artist {
            text-align: left;
            max-width: 70%;
        }

        .player-song-title {
            font-weight: bold;
            color: #6a4c93;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-song-artist {
            font-size: 0.8rem;
            color: #888;
        }

        .player-progress-area {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .player-progress-area span {
            font-size: 0.75rem;
            color: #6a4c93;
            font-family: monospace;
            min-width: 35px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #ffcee6;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff6ec4;
            transition: all 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .progress-bar::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: #00d2ff;
        }

        .player-controls-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
        }

        .player-control-btn {
            background: none;
            border: 2px solid #ffcee6;
            border-radius: 20px;
            color: #6a4c93;
            padding: 5px 15px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .player-control-btn:hover {
            background: #ffcee6;
            color: #ff6ec4;
            transform: scale(1.05);
        }

        .player-control-btn:active {
            transform: scale(0.95);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="transition-helper.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gửi Hương Vy</h1>
        </header>

        <div class="letter-container">
            <div class="letter" id="typed-text"></div>
        </div>

        <div class="video-container" id="video-message">
            <!-- Replace with your video embed code -->
            <iframe src="about:blank" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="surprise-button-container">
            <button class="surprise-button" id="surprise-button">
                Thư giản một chút nhé! 🎁
            </button>
        </div>

        <div class="navigation">
            <a onclick="window.navigateToPage('cake.html')" class="back-button" style="cursor: pointer;">
                <i class="fas fa-arrow-left"></i> Quay lại mình muốn ước nữa
            </a>
        </div>
    </div>

    <!-- Modal for Surprise -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <button class="modal-close" id="modal-close">×</button>
            <div class="modal-header">
                <h2>🎉 Tận hưởng một chút âm nhạc nhé! 🎉</h2>
            </div>
            <div class="modal-body">
                <div class="playlist">
                    <h3 style="margin-bottom: 15px;">Tiếp sức năng lượng 💕</h3>
                    <!-- Will be populated dynamically by JavaScript -->
                </div>

                <!-- Mini Player -->
                <div class="mini-player" id="mini-player">
                    <div class="player-info">
                        <div class="player-title-artist">
                            <div class="player-song-title" id="player-song-title">Tên bài hát</div>
                            <div class="player-song-artist" id="player-song-artist">Nghệ sĩ</div>
                        </div>
                    </div>
                    
                    <div class="player-progress-area">
                        <span class="time-current" id="time-current">00:00</span>
                        <input type="range" class="progress-bar" id="progress-bar" min="0" max="100" value="0">
                        <span class="time-duration" id="time-duration">00:00</span>
                    </div>

                    <div class="player-controls-row">
                        <button class="player-control-btn" id="player-back-10" title="Tua lại 10s">
                            <i class="fas fa-rotate-left"></i> -10s
                        </button>
                        <button class="player-control-btn" id="player-forward-10" title="Tua nhanh 10s">
                            <i class="fas fa-rotate-right"></i> +10s
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="click-sound" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_bb630cc098.mp3?filename=cute-notification-ringtone-1-173850.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.12/typed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.5.1/confetti.browser.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Fade in animation
            setTimeout(() => {
                document.querySelector('.container').style.opacity = 1;
            }, 500);

            // Typewriter effect for letter
            const letterContent = "Tới đây hy vọng Vy vui và thích với món quà nho nhỏ này. Không phải vì cứ muốn để Vy nhớ đâu nhưng Vy xứng đáng với món quà này và vui vì nó. Xem như nó là một món quà mà người bạn yêu quý dành cho Vy. Lần nữa mong những điều tốt đẹp đến bên Vy, ba mẹ luôn khỏe mạnh và bé Ngân thì thời điểm khỏi bệnh đến thiệt mau để mọi người tiếp tục cuộc sống hạnh phúc nhé ❤️.<br>Đừng quên có Hoài luôn bên cạnh có thể chia sẻ những lúc khó khăn mà. Chúc Vy sinh nhật vui vẻ, hạnh phúc và luôn xinh đẹp nhé! Yên tâm những gì Vy ước sẽ mau có được thôi như đã từng nói là mình cầu gì thì thời gian sau sẽ đến mà hehe 🎂✨";
            
            new Typed('#typed-text', {
                strings: [letterContent],
                typeSpeed: 30,
                showCursor: true,
                cursorChar: '|',
                onComplete: function() {
                    setTimeout(() => {
                        document.querySelector('.surprise-button').classList.add('animate__animated', 'animate__pulse', 'animate__infinite');
                    }, 1000);
                }
            });

            // Create floating elements
            const floatingElements = [
                { type: 'heart', color: '#ff6b8a', size: '20px' },
                { type: 'heart', color: '#f48fb1', size: '30px' },
                { type: 'star', color: '#ffd54f', size: '25px' },
                { type: 'star', color: '#ffecb3', size: '15px' },
                { type: 'teddy', emoji: '🧸', size: '30px' },
                { type: 'sparkle', emoji: '✨', size: '25px' },
                { type: 'sparkle', emoji: '✨', size: '20px' },
                { type: 'heart', color: '#ff6b8a', size: '25px' },
                { type: 'star', color: '#ffd54f', size: '20px' },
                { type: 'teddy', emoji: '🧸', size: '25px' }
            ];

            floatingElements.forEach((element, index) => {
                createFloatingElement(element, index);
            });

            // Cursor effect
            document.addEventListener('mousemove', createCursorEffect);

            // Surprise button functionality
            const surpriseButton = document.getElementById('surprise-button');
            const modalOverlay = document.getElementById('modal-overlay');
            const modalClose = document.getElementById('modal-close');
            const clickSound = document.getElementById('click-sound');

            surpriseButton.addEventListener('click', function() {
                clickSound.play();
                modalOverlay.classList.add('active');
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            });

            // Playlist Audio Logic
            const songs = [
                { title: "Nơi Này Có Anh", artist: "Sơn Tùng MTP", src: "music/Nơi Này Có Anh - Sơn Tùng MTP - 01.mp3" },
                { title: "Tỉnh thức sau giấc ngủ đông", artist: "GREY D", src: "music/Tỉnh thức sau giấc ngủ đông - GREY D - 02.mp3" },
                { title: "Đi Giữa Trời Rực Rỡ", artist: "Ngô Lan Hương", src: "music/Đi Giữa Trời Rực Rỡ - Ngô Lan Hương - 03.mp3" },
                { title: "Bài Này Chill Phết", artist: "Đen ft. MIN", src: "music/Bài Này Chill Phết - Đen ft. MIN - 04.mp3" },
                { title: "Nơi pháo hoa rực rỡ", artist: "Orange x Hoàng Dũng", src: "music/Nơi pháo hoa rực rỡ - Orange x Hoàng Dũng - 05.mp3" },
                { title: "Không Phải Dạng Vừa Đâu", artist: "Sơn Tùng MTP", src: "music/Không Phải Dạng Vừa Đâu - Sơn Tùng MTP - 06.mp3" },
                { title: "Người Im Lặng Gặp Người Hay Nói", artist: "HIEUTHUHAI", src: "music/Người Im Lặng Gặp Người Hay Nói - HIEUTHUHAI - 07.mp3" },
                { title: "Hoá Ra", artist: "GREY D", src: "music/Hoá Ra - GREY D - 08.mp3" },
                { title: "Love Yourself", artist: "Justin Bieber", src: "music/Love Yourself - Justin Bieber - 09.mp3" },
                { title: "Unstoppable", artist: "Sia", src: "music/Unstoppable - Sia - 10.mp3" },
                { title: "Happy", artist: "Pharrell Williams", src: "music/Happy - Pharrell Williams - 11.mp3" }
            ];

            // Render playlist items dynamically to keep HTML/JS in sync
            const playlistContainer = document.querySelector('.playlist');
            const playlistTitle = playlistContainer.querySelector('h3');
            playlistContainer.innerHTML = '';
            playlistContainer.appendChild(playlistTitle);

            songs.forEach((song, index) => {
                const coverImg = `image/${(index % 10) + 1}.jpg`;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'playlist-item';
                itemDiv.innerHTML = `
                    <img src="${coverImg}" alt="Song cover">
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${song.title}</div>
                        <div class="playlist-item-artist">${song.artist}</div>
                    </div>
                    <button class="playlist-item-play" data-index="${index}"><i class="fas fa-play"></i></button>
                `;
                playlistContainer.appendChild(itemDiv);
            });

            const playlistAudio = document.createElement('audio');
            playlistAudio.id = 'playlist-audio';
            document.body.appendChild(playlistAudio);

            let currentPlayingIndex = -1;
            const playButtons = document.querySelectorAll('.playlist-item-play');
            const playlistItems = document.querySelectorAll('.playlist-item');

            const miniPlayer = document.getElementById('mini-player');
            const playerSongTitle = document.getElementById('player-song-title');
            const playerSongArtist = document.getElementById('player-song-artist');
            const progressBar = document.getElementById('progress-bar');
            const timeCurrent = document.getElementById('time-current');
            const timeDuration = document.getElementById('time-duration');
            const btnBack10 = document.getElementById('player-back-10');
            const btnForward10 = document.getElementById('player-forward-10');

            function formatTime(seconds) {
                if (isNaN(seconds)) return "00:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function loadSongInMiniPlayer(index) {
                const song = songs[index];
                playerSongTitle.textContent = song.title;
                playerSongArtist.textContent = song.artist;
                miniPlayer.classList.add('active');
                
                progressBar.value = 0;
                timeCurrent.textContent = "00:00";
                timeDuration.textContent = "00:00";
            }

            function updatePlayButtonsUI() {
                playButtons.forEach((btn, idx) => {
                    const icon = btn.querySelector('i');
                    if (idx === currentPlayingIndex && !playlistAudio.paused) {
                        icon.className = 'fas fa-pause';
                        playlistItems[idx].classList.add('playing');
                    } else {
                        icon.className = 'fas fa-play';
                        playlistItems[idx].classList.remove('playing');
                    }
                });
            }

            playButtons.forEach((btn) => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    
                    if (currentPlayingIndex === index) {
                        if (playlistAudio.paused) {
                            if (window.pauseBirthdayAudio) {
                                window.pauseBirthdayAudio();
                            }
                            playlistAudio.play().catch(err => console.log("Play error:", err));
                        } else {
                            playlistAudio.pause();
                        }
                    } else {
                        currentPlayingIndex = index;
                        playlistAudio.src = songs[index].src;
                        loadSongInMiniPlayer(index);
                        if (window.pauseBirthdayAudio) {
                            window.pauseBirthdayAudio();
                        }
                        playlistAudio.play().catch(err => console.log("Play error:", err));
                    }
                    updatePlayButtonsUI();
                });
            });

            playlistAudio.addEventListener('timeupdate', function() {
                if (!playlistAudio.duration) return;
                timeCurrent.textContent = formatTime(playlistAudio.currentTime);
                const percentage = (playlistAudio.currentTime / playlistAudio.duration) * 100;
                progressBar.value = percentage;
            });

            playlistAudio.addEventListener('loadedmetadata', function() {
                timeDuration.textContent = formatTime(playlistAudio.duration);
            });

            progressBar.addEventListener('input', function() {
                if (!playlistAudio.duration) return;
                const newTime = (progressBar.value / 100) * playlistAudio.duration;
                playlistAudio.currentTime = newTime;
                timeCurrent.textContent = formatTime(newTime);
            });

            btnBack10.addEventListener('click', function() {
                playlistAudio.currentTime = Math.max(0, playlistAudio.currentTime - 10);
            });

            btnForward10.addEventListener('click', function() {
                if (playlistAudio.duration) {
                    playlistAudio.currentTime = Math.min(playlistAudio.duration, playlistAudio.currentTime + 10);
                }
            });

            playlistAudio.addEventListener('ended', function() {
                // Auto play next song
                currentPlayingIndex = (currentPlayingIndex + 1) % songs.length;
                playlistAudio.src = songs[currentPlayingIndex].src;
                loadSongInMiniPlayer(currentPlayingIndex);
                playlistAudio.play().catch(err => console.log("Auto-play error:", err));
                updatePlayButtonsUI();
            });

            playlistAudio.addEventListener('play', updatePlayButtonsUI);
            playlistAudio.addEventListener('pause', updatePlayButtonsUI);

            function closePlayer() {
                playlistAudio.pause();
                miniPlayer.classList.remove('active');
                currentPlayingIndex = -1;
                updatePlayButtonsUI();
                if (window.playBirthdayAudio) {
                    window.playBirthdayAudio();
                }
            }

            // Pause audio when modal is closed
            modalClose.addEventListener('click', function() {
                modalOverlay.classList.remove('active');
                closePlayer();
            });

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('active');
                    closePlayer();
                }
            });



            // Helper Functions
            function createFloatingElement(element, index) {
                const floatingElement = document.createElement('div');
                floatingElement.classList.add('floating-element');
                
                if (element.emoji) {
                    floatingElement.textContent = element.emoji;
                    floatingElement.style.fontSize = element.size;
                } else if (element.type === 'heart') {
                    floatingElement.innerHTML = '<i class="fas fa-heart"></i>';
                    floatingElement.style.color = element.color;
                    floatingElement.style.fontSize = element.size;
                } else if (element.type === 'star') {
                    floatingElement.innerHTML = '<i class="fas fa-star"></i>';
                    floatingElement.style.color = element.color;
                    floatingElement.style.fontSize = element.size;
                }
                
                // Random positioning
                const randomX = Math.random() * window.innerWidth;
                const randomY = Math.random() * window.innerHeight;
                floatingElement.style.left = `${randomX}px`;
                floatingElement.style.top = `${randomY}px`;
                
                // Animation duration and delay
                const duration = 5 + Math.random() * 10;
                const delay = Math.random() * 5;
                floatingElement.style.animationDuration = `${duration}s`;
                floatingElement.style.animationDelay = `${delay}s`;
                
                document.body.appendChild(floatingElement);
            }

            function createCursorEffect(e) {
                const cursorEffect = document.createElement('div');
                cursorEffect.classList.add('cursor-effect');
                cursorEffect.style.left = `${e.pageX}px`;
                cursorEffect.style.top = `${e.pageY}px`;
                document.body.appendChild(cursorEffect);
                
                setTimeout(() => {
                    cursorEffect.style.opacity = 1;
                    cursorEffect.style.transform = `translate(-50%, -50%) scale(${Math.random() * 0.5 + 0.5})`;
                    
                    setTimeout(() => {
                        cursorEffect.style.opacity = 0;
                        setTimeout(() => {
                            cursorEffect.remove();
                        }, 500);
                    }, 300);
                }, 10);
            }
        });
    </script>
    <script src="audio-helper.js"></script>
</body>
