<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật Cậu! 🎉</title>
    
    <!-- External CSS / Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- External JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    
    <style>
        body {
            background-color: #feecea;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 60%, #e6ffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s ease-in-out;
            overflow-y: auto;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .lock-box {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 20px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 5px solid white;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.25);
            transform: scale(1);
            transition: all 0.3s ease;
            margin: auto;
        }

        .lock-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse-lock 2s infinite;
        }

        @keyframes pulse-lock {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .lock-box h2 {
            font-size: 2.2rem;
            color: #0072ff;
            margin-bottom: 1rem;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }

        .lock-box p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        /* Passcode dots */
        .passcode-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .passcode-dots .dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            background: white;
            transition: all 0.2s ease;
        }

        .passcode-dots .dot.filled {
            background: #ff6ec4;
            border-color: #ff6ec4;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255, 110, 196, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .passcode-dots .dot.filled::before {
            content: "❤️";
        }

        /* Keypad grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
        }

        .key-btn {
            background: white;
            border: 2px solid #e6f7ff;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 1.6rem;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
            outline: none;
            margin: 0 auto;
        }

        .key-btn:hover {
            transform: scale(1.1);
            background: #e6f7ff;
            border-color: #00d2ff;
            color: #0072ff;
            box-shadow: 0 6px 15px rgba(0, 210, 255, 0.2);
        }

        .key-btn:active {
            transform: scale(0.95);
        }

        .special-btn {
            font-size: 1.4rem;
            background: #f5f5f5;
            color: #555;
            border-color: #eee;
        }

        .special-btn:hover {
            background: #eee;
            color: #333;
            border-color: #ddd;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .check-btn {
            background: linear-gradient(45deg, #00d2ff, #0072ff);
            color: white;
            border: none;
        }

        .check-btn:hover {
            background: linear-gradient(45deg, #0072ff, #00d2ff);
            color: white;
            box-shadow: 0 6px 15px rgba(0, 114, 255, 0.4);
        }

        .error-msg {
            margin-top: 1.5rem;
            color: #ff3366;
            font-size: 1rem;
            min-height: 24px;
            font-weight: bold;
            line-height: 1.4;
        }

        /* Shake animation */
        .shake {
            animation: shake-box 0.5s ease-in-out;
        }

        @keyframes shake-box {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* Responsive Design for Samsung S26 Ultra, Mobile Devices & Shorter Screens */
        @media (max-width: 480px) or (max-height: 800px) {
            .lock-box {
                padding: 2rem 1.5rem;
                border-radius: 16px;
                border-width: 4px;
                box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            }

            .lock-icon {
                font-size: 3rem;
                margin-bottom: 0.5rem;
            }

            .lock-box h2 {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }

            .lock-box p {
                font-size: 0.95rem;
                margin-bottom: 1rem;
                line-height: 1.4;
            }

            .passcode-dots {
                gap: 8px;
                margin-bottom: 1.5rem;
            }

            .passcode-dots .dot {
                width: 16px;
                height: 16px;
                border-width: 1.5px;
            }

            .passcode-dots .dot.filled {
                font-size: 10px;
            }

            .keypad {
                gap: 12px;
                max-width: 280px;
            }

            .key-btn {
                width: 60px;
                height: 60px;
                font-size: 1.4rem;
                border-width: 1.5px;
            }

            .special-btn {
                font-size: 1.2rem;
            }

            .error-msg {
                margin-top: 1rem;
                font-size: 0.9rem;
                min-height: 20px;
            }
        }

        /* Extra small height screen adjustments (e.g. landscape mode or tiny viewports) */
        @media (max-height: 600px) {
            .lock-box {
                padding: 1.25rem 1rem;
            }

            .lock-icon {
                font-size: 2.2rem;
                margin-bottom: 0.25rem;
            }

            .lock-box h2 {
                font-size: 1.5rem;
                margin-bottom: 0.25rem;
            }

            .lock-box p {
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }

            .passcode-dots {
                gap: 6px;
                margin-bottom: 1rem;
            }

            .passcode-dots .dot {
                width: 12px;
                height: 12px;
            }

            .passcode-dots .dot.filled {
                font-size: 8px;
            }

            .keypad {
                gap: 8px;
                max-width: 240px;
            }

            .key-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }

            .special-btn {
                font-size: 1rem;
            }

            .error-msg {
                margin-top: 0.5rem;
                font-size: 0.8rem;
                min-height: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Passcode Lock Screen Overlay -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-box">
            <div class="lock-icon" id="lockIcon">🔒</div>
            <h2>Mở Khóa Điều Bất Ngờ! 🎁</h2>
            <p>Vui lòng nhập mật mã (ngày sinh của Hương Vy) để nhận quà nhé:</p>
            
            <div class="passcode-dots" id="passcodeDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="keypad">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn special-btn" onclick="pressKey('delete')">⌫</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn special-btn check-btn" onclick="pressKey('submit')">✨</button>
            </div>
            
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="transition-helper.js"></script>
    <script src="audio-helper.js"></script>
    <script>
        // Passcode keypad verification logic
        let enteredPasscode = "";
        const PASSCODE_LIMIT = 8;
        const TARGET_PASSCODE = "23072003";

        function updateDots() {
            const dots = document.querySelectorAll(".passcode-dots .dot");
            dots.forEach((dot, index) => {
                if (index < enteredPasscode.length) {
                    dot.classList.add("filled");
                } else {
                    dot.classList.remove("filled");
                }
            });
        }

        function pressKey(key) {
            const errorMsg = document.getElementById("errorMsg");
            if (key === "delete") {
                if (enteredPasscode.length > 0) {
                    enteredPasscode = enteredPasscode.slice(0, -1);
                    updateDots();
                    errorMsg.textContent = "";
                }
            } else if (key === "submit") {
                verifyPasscode();
            } else {
                if (enteredPasscode.length < PASSCODE_LIMIT) {
                    enteredPasscode += key;
                    updateDots();
                    errorMsg.textContent = "";
                    
                    if (enteredPasscode.length === PASSCODE_LIMIT) {
                        setTimeout(verifyPasscode, 300);
                    }
                }
            }
        }

        function verifyPasscode() {
            const lockBox = document.querySelector(".lock-box");
            const errorMsg = document.getElementById("errorMsg");
            const lockScreen = document.getElementById("lockScreen");
            const lockIcon = document.getElementById("lockIcon");

            if (enteredPasscode.length === 0) {
                errorMsg.textContent = "Nhập ngày sinh của bestie vào nhé! 💕";
                return;
            }

            if (enteredPasscode === TARGET_PASSCODE) {
                lockIcon.textContent = "🔓";
                errorMsg.style.color = "#32CD32";
                errorMsg.textContent = "Chính xác! Đang chuyển tiếp... ✨";
                
                if (window.playBirthdayAudio) {
                    window.playBirthdayAudio();
                }

                gsap.to(lockScreen, {
                    opacity: 0,
                    duration: 1.2,
                    ease: "power2.out",
                    onComplete: () => {
                        if (window.navigateToPage) {
                            window.navigateToPage("gift.html");
                        } else {
                            window.location.href = "gift.html";
                        }
                    }
                });
            } else {
                lockBox.classList.add("shake");
                errorMsg.textContent = "Ơ kìa bestie, ngày sinh của mình mà cũng quên sao? 😢 (Gợi ý: Ngày đẹp nhất năm 2003 đó! 😉)";
                enteredPasscode = "";
                updateDots();
                
                setTimeout(() => {
                    lockBox.classList.remove("shake");
                }, 500);
            }
        }

        document.addEventListener("keydown", (e) => {
            const lockScreen = document.getElementById("lockScreen");
            if (lockScreen && lockScreen.style.display !== "none") {
                if (e.key >= "0" && e.key <= "9") {
                    pressKey(e.key);
                } else if (e.key === "Backspace") {
                    pressKey("delete");
                } else if (e.key === "Enter") {
                    pressKey("submit");
                }
            }
        });
    </script>
</body>
</html>
